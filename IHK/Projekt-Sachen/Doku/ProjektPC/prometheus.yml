---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    basic_auth:
      username: 'admin'
      password: 'Admin123'

    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["127.0.0.1:9100"]
        labels:
          instance: "Monitoring_srv"
      - targets: ["10.0.0.14:9100"]
        labels:
          instance: "Webclient"


  - job_name: "Windows_VM_Metrics"
    static_configs:
      - targets: ["10.0.0.11:9182"]
        labels:
          instance: "windows_client"
      - targets: ["10.0.0.12:9182"]
        labels:
          instance: "ftp-server"
      - targets: ["10.0.0.10:9182"]
        labels:
          instance: "Hyper-V_Host"

  - job_name: "apache"
    static_configs:
      - targets: ["10.0.0.14:9117"]
        labels:
          instance: "Webclient"

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.0.0.14
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
